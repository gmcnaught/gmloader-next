name: gmloader-Next Build

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags: ['v*']
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**/README.md'

jobs:
  build-mister-arm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build ARM binary in container
        run: |
          chmod +x .github/scripts/build_mister_arm.sh
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm32v7/debian:bullseye-slim \
            bash .github/scripts/build_mister_arm.sh

      - name: Commit binary (master push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games/gmloader/gmloader
          git diff --staged --quiet || git commit -m "ci: rebuild ARM binary [skip ci]"
          git push

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd ${{ github.workspace }}
          cp gmloader.json games/gmloader/gmloader.json
          printf "# libGLES_sw.so\n\nThis file is NOT included in the repository.\nSee 3rdparty/gles2-sw/ for instructions on obtaining the software GLES2 renderer.\nPlace libGLES_sw.so in the same directory as the gmloader binary.\n" \
            > games/gmloader/libGLES_SW_README.txt
          mkdir -p games/gmloader/APKs
          cd games
          zip -r ${{ github.workspace }}/gmloader-mister-${{ github.ref_name }}.zip gmloader/

      - name: Upload release zip
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: gmloader-mister-${{ github.ref_name }}
          path: gmloader-mister-${{ github.ref_name }}.zip

  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
    name: Debian ${{ matrix.arch.name }}
    strategy:
      fail-fast: false
      matrix:
        arch: 
          - name: arm64
            cross: aarch64-linux-gnu
            executable: aarch64
          - name: armhf
            cross: arm-linux-gnueabihf
            executable: armhf

    steps:
      - name: Install ${{ matrix.arch.name }} dependencies
        run: |
          dpkg --add-architecture ${{ matrix.arch.name }}
          apt update
          apt install -y --no-install-recommends python3 git dpkg-dev build-essential binutils python3-clang binutils-${{ matrix.arch.cross }} libstdc++-10-dev-${{ matrix.arch.name }}-cross linux-libc-dev-${{ matrix.arch.name }}-cross make linux-libc-dev-${{ matrix.arch.name }}-cross linux-libc-dev-${{ matrix.arch.name }}-cross gcc-${{ matrix.arch.cross }} g++-${{ matrix.arch.cross }} libsdl2-dev:${{ matrix.arch.name }} libzip-dev:${{ matrix.arch.name }} ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ${{ matrix.arch.name }}
        run: make -f Makefile.gmloader ARCH=${{ matrix.arch.cross }} LLVM_FILE=/usr/lib/llvm-11/lib/libclang-11.so LLVM_INC=/usr/${{ matrix.arch.cross }}/include/c++/10/${{ matrix.arch.cross }} -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gmloadernext_${{ matrix.arch.name }}
          path: ${{ github.workspace }}/build/${{ matrix.arch.cross }}/gmloader/gmloadernext.${{ matrix.arch.executable}}
